<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - I3 Typing Master</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f9; }
        .register-container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; }
        label { display: block; margin-top: 10px; color: #666; font-size: 14px; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; margin-top: 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        .footer-link { text-align: center; margin-top: 15px; font-size: 13px; }
    </style>
</head>
<body>

<div class="register-container">
    <h2>Create Account</h2>
    <form action="login.html" method="POST">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" name="username" placeholder="Choose a username" required>

        <label for="reg-email">Email Address</label>
        <input type="email" id="reg-email" name="email" placeholder="example@mail.com" required>

        <label for="reg-password">Password</label>
        <input type="password" id="reg-password" name="password" placeholder="Create a password" required>

        <label for="confirm-password">Confirm Password</label>
        <input type="password" id="confirm-password" name="confirm_password" placeholder="Repeat password" required>

        <button type="submit">Register Now</button>
    </form>
    <div class="footer-link">
        Already have an account? <a href="login.html">Login here</a>
    </div>
</div>

</body>
</html>
