<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeMaster 2026 | Welcome</title>
    <style>
        /* Modern Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #2d3436;
        }

        .container {
            text-align: center;
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }

        /* Header Section */
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #2c3e50;
        }

        header h1 span {
            color: #3498db;
            font-weight: 300;
        }

        header p {
            color: #7f8c8d;
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        /* Menu Buttons */
        .menu-options {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .btn {
            display: block;
            padding: 12px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 1px solid #dfe6e9;
            color: #2d3436;
        }

        .btn-primary {
            background-color: #3498db;
            color: white;
            border: none;
            font-size: 1.1rem;
            padding: 15px;
        }

        .btn-primary:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
        }

        .auth-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .btn-outline:hover {
            background-color: #f8f9fa;
            border-color: #b2bec3;
        }

        .footer-link {
            margin-top: 1.5rem;
            display: inline-block;
            font-size: 0.85rem;
            color: #95a5a6;
            text-decoration: none;
        }

        .footer-link:hover {
            text-decoration: underline;
        }

        footer {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>TypeMaster <span>2026</span></h1>
            <p>Master Your Speed</p>
        </header>

        <main class="menu-options">
            <a href="typing-test.html" class="btn btn-primary">Start Typing Test</a>

            <div class="auth-grid">
                <a href="login.html" class="btn btn-outline">Login</a>
                <a href="register.html" class="btn btn-outline">Register</a>
            </div>

            <a href="reset-password.html" class="footer-link">Forgot Password?</a>
        </main>

        <footer>
            <a href="about.html" style="color: inherit; text-decoration: none;">About the Team</a>
            <p style="margin-top: 10px;">© 2026 Sreysoth, Sopheary & Sangexie</p>
        </footer>
    </div>

</body>
</html>
